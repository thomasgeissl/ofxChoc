name: Release ofJsRuntime

on:
  push:
    tags:
      - '*'

env:
  OF_VERSION: 0.12.1

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux64
            of_package: of_v0.12.1_linux64_gcc6_release
          - os: macos-15
            platform: osx
            of_package: of_v0.12.1_osx_release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout ofxChoc
        uses: actions/checkout@v4
        with:
          path: ofxChoc

      - name: Cache openFrameworks
        id: cache-of
        uses: actions/cache@v4
        with:
          path: openFrameworks
          key: of-${{ matrix.of_package }}

      - name: Download openFrameworks
        if: steps.cache-of.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/openframeworks/openFrameworks/releases/download/${{ env.OF_VERSION }}/${{ matrix.of_package }}.tar.gz"
          tar -xzf "${{ matrix.of_package }}.tar.gz"
          mv "${{ matrix.of_package }}" openFrameworks

      - name: Place addon in OF addons directory
        run: mv ofxChoc openFrameworks/addons/ofxChoc

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            make g++ libgl1-mesa-dev libglu1-mesa-dev libraw1394-dev libudev-dev \
            libdrm-dev libglew-dev libopenal-dev libsndfile1-dev libfreeimage-dev \
            libcairo2-dev libfreetype6-dev libssl-dev libpulse-dev libusb-1.0-0-dev \
            libgtk2.0-dev libgtk-3-dev libopencv-dev libassimp-dev librtaudio-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-libav gstreamer1.0-pulseaudio gstreamer1.0-x \
            gstreamer1.0-plugins-bad gstreamer1.0-alsa gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good libglfw3-dev liburiparser-dev libpugixml-dev \
            libgtk2.0-0 libpoco-dev libxcursor-dev libxi-dev libxinerama-dev \
            libxml2-dev libwayland-dev wayland-protocols libxkbcommon-dev \
            libxkbcommon-x11-dev libdecor-0-dev libglvnd-dev libegl1-mesa-dev \
            libgles2-mesa-dev mesa-utils libunwind-dev libharfbuzz-dev \
            libjack-jackd2-0 libjack-jackd2-dev freeglut3-dev libasound2-dev \
            libxmu-dev libxxf86vm-dev nlohmann-json3-dev libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Build ofJsRuntime
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          make -C openFrameworks/addons/ofxChoc/ofJsRuntime -j"$NPROC" Release

      - name: Package binary (Linux)
        if: matrix.platform == 'linux64'
        run: |
          cp openFrameworks/addons/ofxChoc/ofJsRuntime/bin/ofJsRuntime \
             ofJsRuntime-linux64

      - name: Package binary (macOS)
        if: matrix.platform == 'osx'
        run: |
          cd openFrameworks/addons/ofxChoc/ofJsRuntime/bin
          zip -r "$GITHUB_WORKSPACE/ofJsRuntime-osx.zip" ofJsRuntime.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ofJsRuntime-${{ matrix.platform }}
          path: ofJsRuntime-*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ofJsRuntime-linux64
            dist/ofJsRuntime-osx.zip
